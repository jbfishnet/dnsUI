services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-9124}:8000"
    pid: host
    privileged: true
    volumes:
      - /etc/dnsmasq.conf:/etc/dnsmasq.conf
    environment:
      - DNSMASQ_CONF=/etc/dnsmasq.conf
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${HTTPS_PORT:-9123}:443"
      - "${HTTP_PORT:-9180}:80"
    depends_on:
      - backend
    restart: unless-stopped
