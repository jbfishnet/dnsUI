services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-9124}:8000"
    volumes:
      - /etc/dnsmasq.conf:/etc/dnsmasq.conf
      - /run/systemd/private:/run/systemd/private
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
    environment:
      - DNSMASQ_CONF=/etc/dnsmasq.conf
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${HTTPS_PORT:-9123}:443"
      - "${HTTP_PORT:-9180}:80"
    depends_on:
      - backend
    restart: unless-stopped
