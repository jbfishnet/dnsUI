name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write
  packages: write

jobs:
  # ── Resolve version ────────────────────────────────────────────────────────
  # Makes ${{ needs.version.outputs.tag }} available to all downstream jobs.
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Run the full test suite first ──────────────────────────────────────────
  test-backend:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r backend/requirements.txt
      - run: python -m pytest backend/tests/ -v --tb=short

  test-frontend:
    name: Frontend tests (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  # ── Build & push Docker images to GHCR ─────────────────────────────────────
  docker-publish:
    name: Publish Docker images (${{ matrix.service }})
    needs: [version, test-backend, test-frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image: ghcr.io/${{ github.repository_owner }}/dnsui-backend
          - service: frontend
            context: ./frontend
            image: ghcr.io/${{ github.repository_owner }}/dnsui-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ needs.version.outputs.tag }}
            ${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ───────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [version, docker-publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${VERSION}$" | head -1 || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges | head -30)
          fi
          {
            echo "RELEASE_NOTES<<EOF"
            echo "## What's changed"
            echo ""
            echo "$LOG"
            echo ""
            echo "## Docker images"
            echo ""
            echo '```'
            echo "ghcr.io/${{ github.repository_owner }}/dnsui-backend:${VERSION}"
            echo "ghcr.io/${{ github.repository_owner }}/dnsui-frontend:${VERSION}"
            echo '```'
            echo ""
            echo "## One-line install"
            echo ""
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash"
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "dnsmasq Manager ${{ needs.version.outputs.tag }}"
          body: ${{ steps.notes.outputs.RELEASE_NOTES }}
          files: install.sh
          generate_release_notes: false
