name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Run the full test suite first ──────────────────────────────────────────
  test-backend:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r backend/requirements.txt
      - run: python -m pytest backend/tests/ -v --tb=short

  test-frontend:
    name: Frontend tests (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  # ── Build & push Docker images to GHCR ─────────────────────────────────────
  docker-publish:
    name: Publish Docker images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image: ghcr.io/${{ github.repository_owner }}/dnsui-backend
          - service: frontend
            context: ./frontend
            image: ghcr.io/${{ github.repository_owner }}/dnsui-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ───────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [docker-publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          # Collect commits since the previous tag (or all if first release)
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p' || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges | head -30)
          fi
          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "## What's changed" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "## Docker images" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo '```' >> "$GITHUB_OUTPUT"
          echo "ghcr.io/${{ github.repository_owner }}/dnsui-backend:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/${{ github.repository_owner }}/dnsui-frontend:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo '```' >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "## One-line install" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo '```bash' >> "$GITHUB_OUTPUT"
          echo "curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash" >> "$GITHUB_OUTPUT"
          echo '```' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "dnsmasq Manager ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.RELEASE_NOTES }}
          files: install.sh
          generate_release_notes: false
