name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR/branch so only the latest commit runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Backend – lint + type-check + pytest
  # ──────────────────────────────────────────────
  test-backend:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: python -m pytest backend/tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # 2. Frontend – type-check + vitest
  # ──────────────────────────────────────────────
  test-frontend:
    name: Frontend tests (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npm run lint
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend

  # ──────────────────────────────────────────────
  # 3. Docker build (only after both test jobs pass)
  # ──────────────────────────────────────────────
  build-docker:
    name: Docker build
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t dnsui-backend ./backend

      - name: Build frontend image
        run: docker build -t dnsui-frontend ./frontend
